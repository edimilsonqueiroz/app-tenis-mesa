[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Padrão de nomes de arquivo de teste
python_files = test_*.py

# Padrão de nomes de classe de teste
python_classes = Test*

# Padrão de nomes de função de teste
python_functions = test_*

# Mostrar prints durante testes
addopts = -v --tb=short --strict-markers

# Marcadores customizados
markers =
    integration: testes de integração do sistema completo
    unit: testes unitários
    models: testes dos modelos
    routes: testes das rotas
    ittf: testes das regras ITTF
    slow: testes lentos
