{% extends "base.html" %}

{% block title %}Placar - Tênis de Mesa{% endblock %}

{% block meta %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b0b">
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/placar_mesa.css') }}">
{% endblock %}

{% block content %}
    <div class="header-info">
        <div class="header-left">
            <button class="voltar-btn" onclick="voltarAtras()"><i class="fas fa-arrow-left"></i> Voltar</button>
            <div class="mesa-info"><i class="fas fa-table-tennis-paddle-ball" style="color: #00c9a7; margin-right: 12px;"></i>Mesa <span id="mesa-numero">--</span></div>
            <div class="status-info"><i class="fas fa-signal" style="color: #00c9a7; margin-right: 8px;"></i>Placar em Tempo Real</div>
        </div>
        <div class="header-right">
            <button class="fullscreen-btn" onclick="toggleFullscreen()" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <div class="sets-info">
        <div class="set-block">
            <div class="set-label">SET</div>
            <div class="set-number" id="set-numero">1</div>
        </div>
        <div class="set-block">
            <div class="set-label" id="set-label-time1">LADO 1 - SETS</div>
            <div class="set-number" id="sets-time1">0</div>
        </div>
        <div class="set-block">
            <div class="set-label" id="set-label-time2">LADO 2 - SETS</div>
            <div class="set-number" id="sets-time2">0</div>
        </div>
    </div>

    <div class="placar-wrapper">
        <div class="placar-display">
            <div class="time-block">
                <div class="jogadores-header">
                    <div class="jogadores-nome" id="time1-nome">
                        <div class="jogador-principal">TIME 1</div>
                    </div>
                </div>
                <div class="pontos" id="pontos-1">0</div>
                <div class="sacador-indicator" id="sacador-time1">
                    <span class="sacador-dot"></span>
                    <span class="sacador-text">Sacando</span>
                </div>
            </div>

            <div class="divisor-placar">×</div>

            <div class="time-block">
                <div class="jogadores-header">
                    <div class="jogadores-nome" id="time2-nome">
                        <div class="jogador-principal">TIME 2</div>
                    </div>
                </div>
                <div class="pontos" id="pontos-2">0</div>
                <div class="sacador-indicator" id="sacador-time2">
                    <span class="sacador-dot"></span>
                    <span class="sacador-text">Sacando</span>
                </div>
            </div>
        </div>
    </div>

    <div class="rodape-info">
        <div class="time-jogadores">
            <div id="list-time1"></div>
        </div>
        <div class="time-jogadores">
            <div id="list-time2"></div>
        </div>
    </div>

    <button class="fullscreen-exit-mobile" onclick="toggleFullscreen()" id="fullscreen-exit-mobile" title="Sair do modo tela cheia">
        <i class="fas fa-compress"></i>
    </button>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        window.APP_CONFIG = { mesaId: {{ mesa_id }}, campeonatoId: {% if campeonato_id %}{{ campeonato_id }}{% else %}null{% endif %} };
    </script>
    <script src="{{ url_for('static', filename='js/placar_mesa.js') }}"></script>
{% endblock %}
