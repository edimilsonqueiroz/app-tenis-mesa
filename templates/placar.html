{% extends "base.html" %}

{% block title %}Placar - Tênis de Mesa{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/placar.css') }}">
{% endblock %}

{% block content %}
    <button class="voltar-btn" onclick="voltarInicio()"><i class="fas fa-arrow-left"></i> Voltar</button>
    
    <header>
        <h1><span class="placar-title-icon"><i class="fas fa-table-tennis-paddle-ball"></i></span>Placar do Campeonato</h1>
        <p>Exibicao para TV/Desktop sincronizada em tempo real.</p>
    </header>

    <div class="placar-container" id="placar-container">
        <p class="loading">Carregando mesas do campeonato...</p>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        window.APP_CONFIG = { campeonatoId: {{ campeonato_id }} };
    </script>
    <script src="{{ url_for('static', filename='js/placar.js') }}"></script>
{% endblock %}
